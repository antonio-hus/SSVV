services:
  db-test:
    image: postgres:18-alpine
    container_name: gymtrackerpro-test-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB:       gymtrackerpro_test
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - test_postgres_data:/var/lib/postgresql
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U postgres -d gymtrackerpro_test"]
      interval:     5s
      timeout:      5s
      retries:      10
      start_period: 10s

volumes:
  test_postgres_data: